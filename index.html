<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Saya</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:#020617;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:100px 20px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
}

.hero h1{
font-size:40px;
}

.hero button{
padding:12px 25px;
border:none;
border-radius:8px;
background:white;
font-weight:bold;
cursor:pointer;
}

.features{
padding:50px;
text-align:center;
}

.cards{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
width:220px;
}

footer{
text-align:center;
padding:20px;
background:#020617;
}

</style>
</head>

<body>

<header>
<h2>MyWebsite</h2>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Selamat Datang di Website Saya</h1>
<p>Website sederhana dibuat dengan HTML & CSS</p>
<button>Mulai</button>
</section>

<section class="features">

<h2>Fitur Website</h2>

<div class="cards">

<div class="card">
<h3>Cepat</h3>
<p>Website ringan dan cepat dibuka.</p>
</div>

<div class="card">
<h3>Responsive</h3>
<p>Tampilan cocok untuk HP dan laptop.</p>
</div>

<div class="card">
<h3>Modern</h3>
<p>Desain modern dan sederhana.</p>
</div>

</div>

</section>

<footer>
<p>© 2026 MyWebsite</p>
</footer>

</body>
</html>
